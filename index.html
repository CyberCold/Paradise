<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>Paradise</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box}
        html,body{margin:0;min-height:100%;background:#fff;color:#0a0a0f}
        body{display:grid;min-height:100vh;place-items:center;padding:24px;font-family:"Press Start 2P",monospace;background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.025) 0,rgba(0,0,0,.025) 1px,transparent 1px,transparent 3px)}
        .gate{width:min(440px,100%);border:3px solid #0a0a0f;box-shadow:8px 8px 0 #b5763a;background:#f8f8f8;padding:28px 20px;text-align:center}
        .logo{font-family:"VT323",monospace;font-size:48px;letter-spacing:5px;margin-bottom:24px;text-shadow:3px 3px 0 rgba(181,118,58,.3)}
        .status{font-size:11px;line-height:1.8;color:#7a6a50}
        .bar{height:8px;margin:22px 0 0;border:2px solid #0a0a0f;background:#fff;overflow:hidden}
        .bar::after{content:"";display:block;width:35%;height:100%;background:#b5763a;animation:scan 1.1s steps(5,end) infinite}
        .denied .bar{display:none}.denied .status{color:#b42318}
        @keyframes scan{from{transform:translateX(-110%)}to{transform:translateX(300%)}}
    </style>
</head>
<body>
    <main class="gate" id="gate" aria-live="polite">
        <div class="logo">PARADISE</div>
        <div class="status" id="status">ПРОВЕРКА ДОСТУПА...</div>
        <div class="bar" aria-hidden="true"></div>
    </main>
    <script>
    (() => {
        "use strict";
        const gate = document.getElementById("gate");
        const status = document.getElementById("status");

        function deny(message) {
            gate.classList.add("denied");
            status.textContent = message;
        }

        function telegramInitData() {
            const sdkValue = window.Telegram?.WebApp?.initData;
            if (sdkValue) return sdkValue;
            try {
                return new URLSearchParams(location.hash.slice(1)).get("tgWebAppData") || "";
            } catch {
                return "";
            }
        }

        function installationId() {
            const key = "paradise_browser_installation_id";
            try {
                let value = localStorage.getItem(key);
                if (!/^[a-zA-Z0-9_-]{16,120}$/.test(value || "")) {
                    const bytes = new Uint8Array(24);
                    crypto.getRandomValues(bytes);
                    value = Array.from(bytes, byte => byte.toString(16).padStart(2, "0")).join("");
                    localStorage.setItem(key, value);
                }
                return value;
            } catch {
                return "";
            }
        }

        function webglInfo() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
                if (!gl) return {};
                const extension = gl.getExtension("WEBGL_debug_renderer_info");
                return {
                    webgl_vendor: extension ? gl.getParameter(extension.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
                    webgl_renderer: extension ? gl.getParameter(extension.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER),
                };
            } catch {
                return {};
            }
        }

        async function fingerprint() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            const value = {
                install_id: installationId(),
                screen: `${screen.width}x${screen.height}@${window.devicePixelRatio || 1}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
                color_depth: screen.colorDepth || null,
                touch: navigator.maxTouchPoints || 0,
                platform: navigator.platform || "",
                memory: navigator.deviceMemory || null,
                cores: navigator.hardwareConcurrency || null,
                connection: connection?.effectiveType || "",
                languages: Array.from(navigator.languages || []).slice(0, 12),
                ...webglInfo(),
            };
            try {
                if (navigator.userAgentData?.getHighEntropyValues) {
                    const hints = await navigator.userAgentData.getHighEntropyValues(["platform","platformVersion","architecture","bitness","model"]);
                    value.ua_platform = hints.platform || "";
                    value.ua_platform_version = hints.platformVersion || "";
                    value.ua_architecture = hints.architecture || "";
                    value.ua_bitness = hints.bitness || "";
                    value.ua_model = hints.model || "";
                    value.ua_mobile = navigator.userAgentData.mobile === true;
                }
            } catch {}
            return value;
        }

        async function openApplication() {
            window.Telegram?.WebApp?.ready?.();
            window.Telegram?.WebApp?.expand?.();
            const initData = telegramInitData();
            if (!initData) {
                deny("ОТКРОЙТЕ КАТАЛОГ ЧЕРЕЗ БОТА В TELEGRAM");
                return;
            }
            try {
                const response = await fetch("/app", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    cache: "no-store",
                    credentials: "same-origin",
                    body: JSON.stringify({initData, fingerprint: await fingerprint()}),
                });
                if (response.status === 403) {
                    deny("ДОСТУП ЗАКРЫТ");
                    return;
                }
                if (response.status === 401) {
                    deny("СЕССИЯ TELEGRAM НЕДЕЙСТВИТЕЛЬНА. ОТКРОЙТЕ КАТАЛОГ ЗАНОВО.");
                    return;
                }
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const html = await response.text();
                if (!/<html[\s>]/i.test(html)) throw new Error("Invalid application payload");
                const securedHtml = html.replace(/<head(\s[^>]*)?>/i, match => `${match}<script>window.__PARADISE_GATE_GRANTED__=true;<\/script>`);
                document.open();
                document.write(securedHtml);
                document.close();
            } catch {
                deny("СЕРВИС ВРЕМЕННО НЕДОСТУПЕН. ПОПРОБУЙТЕ ПОЗЖЕ.");
            }
        }

        openApplication();
    })();
    </script>
</body>
</html>
